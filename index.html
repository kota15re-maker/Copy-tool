<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>定型文コピーツール</title>
    <style>
        /* キーボード表示を考慮した上部固定レイアウト */
        body {
            font-family: sans-serif;
            margin: 0;
            padding-top: env(safe-area-inset-top); /* iPhoneのノッチ対策 */
            background-color: #f8f9fa;
        }

        .header-ui {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        /* 2行分のテキストエリア */
        textarea {
            width: 100%;
            height: 3em; /* 約2〜3行分 */
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            display: block;
            margin-bottom: 10px;
        }

        /* ボタンのコンテナ */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4列構成 */
            gap: 8px;
            margin-bottom: 10px;
        }

        /* 定型文ボタン */
        .preset-btn {
            padding: 10px 0;
            font-size: 14px;
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        /* メインのコピーボタン */
        .copy-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .copy-btn:active { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="header-ui">
    <textarea id="myInput" placeholder="ここに入力..."></textarea>

    <div class="button-grid">
        <button class="preset-btn" onclick="setPreset('ああ')">ああ</button>
        <button class="preset-btn" onclick="setPreset('いい')">いい</button>
        <button class="preset-btn" onclick="setPreset('うう')">うう</button>
        <button class="preset-btn" onclick="setPreset('ええ')">ええ</button>
        <button class="preset-btn" onclick="setPreset('おお')">おお</button>
        <button class="preset-btn" onclick="setPreset('かか')">かか</button>
        <button class="preset-btn" onclick="setPreset('きき')">きき</button>
        <button class="preset-btn" onclick="setPreset('くく')">くく</button>
    </div>

    <button class="copy-btn" onclick="copyAndOpen()">コピーしてKDE Connectを起動</button>
</div>

<script>
    // 定型文を入力欄にセットする
    function setPreset(text) {
        document.getElementById("myInput").value = text;
    }

    // コピーしてアプリを起動
    function copyAndOpen() {
        const copyTarget = document.getElementById("myInput");
        
        // クリップボードにコピー
        navigator.clipboard.writeText(copyTarget.value).then(() => {
            // KDE Connectを起動
            window.location.href = "kdeconnect://";
        });
    }
</script>

</body>
</html>
